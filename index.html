<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歐客佬精品烘培 - 翡翠精品莊園咖啡</title>
    <style>
        :root { --primary-brown: #5D4037; --soft-beige: #F9F7F2; --accent-gold: #C2A378; }
        body { font-family: sans-serif; background-color: var(--soft-beige); padding: 20px; color: var(--primary-brown); }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 20px; }
        .tab-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 8px 20px; cursor: pointer; border: 1px solid var(--accent-gold); border-radius: 50px; color: var(--accent-gold); font-weight: bold; }
        .tab.active { background: var(--accent-gold); color: white; }
        .product-hero { text-align: center; margin-bottom: 20px; border: 1px solid #EEE; padding: 10px; border-radius: 10px; background: #fff; }
        .product-img { width: 100%; max-height: 500px; object-fit: contain; border-radius: 5px; }
        .cart-section { display: grid; grid-template-columns: 1fr 350px; gap: 20px; margin-top: 30px; border-top: 2px solid #F0E6D6; padding-top: 20px; }
        @media (max-width: 768px) { .cart-section { grid-template-columns: 1fr; } }
        .cart-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #EEE; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 15px 0; border: 1px solid #DDD; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { cursor: pointer; border-radius: 5px; border: none; font-weight: bold; width: 100%; }
        .btn-add { background: var(--primary-brown); color: white; padding: 12px; margin-top: 10px; }
        .btn-send { background: #27ae60; color: white; padding: 15px; font-size: 1.1em; }
        label { font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>歐客佬精品烘培</h2>
        <p>翡翠精品莊園咖啡 - 訂購系統</p>
    </div>

    <div class="tab-container">
        <div class="tab active" onclick="switchCategory('生吐司')">日系生吐司</div>
        <div class="tab" onclick="switchCategory('米香花生')">米香花生</div>
        <div class="tab" onclick="switchCategory('掛耳咖啡')">精品掛耳</div>
    </div>

    <div class="product-hero">
        <img id="mainImg" src="" class="product-img">
    </div>

    <div style="background: #FFF; padding: 20px; border: 1px solid #F0E6D6; border-radius: 10px;">
        <label>選擇品項口味</label>
        <select id="prodSel" onchange="updateUI()"></select>
        <label>訂購數量</label>
        <input type="number" id="prodQty" value="1" min="1">
        <button class="btn-add" onclick="addToCart()">加入購物車</button>
    </div>

    <div class="cart-section">
        <div>
            <h3>🛒 購物清單</h3>
            <div id="cartDisplay">目前無商品</div>
            <div style="font-size: 1.5em; color: #B22222; margin-top: 20px; font-weight: bold;">
                總金額: $<span id="totalPrice">0</span>
            </div>
        </div>
        <div style="background: #FDFBF8; padding: 20px; border-radius: 10px; border: 1px solid #EEE;">
            <h3>🚚 配送與對帳資訊</h3>
            <label>收件人姓名</label>
            <input type="text" id="uName" placeholder="請填寫收件姓名">
            <label>電話</label>
            <input type="tel" id="uPhone" placeholder="請填寫電話">
            <label>配送地址</label>
            <input type="text" id="uAddress" placeholder="請填寫完整寄送地址">
            <label>匯款帳號後五碼</label>
            <input type="text" id="uBank" placeholder="請填寫匯款帳號後五碼">
            <button class="btn-send" id="sendBtn" onclick="submitToExcel()">送出訂單並查看匯款帳號</button>
        </div>
    </div>
</div>

<script>
    const products = {
        '生吐司': [
            { name: '芝麻捲心生吐司', price: 220, img: 'https://i.postimg.cc/0MZb87G7/sheng-tu-si.jpg' },
            { name: '原味生吐司', price: 130, img: 'https://i.postimg.cc/0MZb87G7/sheng-tu-si.jpg' },
            { name: '黃金全麥生吐司', price: 130, img: 'https://i.postimg.cc/0MZb87G7/sheng-tu-si.jpg' },
            { name: '藝伎咖啡生吐司', price: 160, img: 'https://i.postimg.cc/0MZb87G7/sheng-tu-si.jpg' },
            { name: '艾美黛巧克力生吐司', price: 180, img: 'https://i.postimg.cc/0MZb87G7/sheng-tu-si.jpg' },
            { name: '宇治紅豆生吐司', price: 180, img: 'https://i.postimg.cc/0MZb87G7/sheng-tu-si.jpg' }
        ],
        '米香花生': [
            { name: '米香花生 (麻辣酥)', price: 150, img: 'https://i.postimg.cc/S2VJycL8/mi-xiang-hua-sheng.jpg' },
            { name: '米香花生 (白米酥)', price: 150, img: 'https://i.postimg.cc/S2VJycL8/mi-xiang-hua-sheng.jpg' },
            { name: '米香花生 (黑米酥)', price: 150, img: 'https://i.postimg.cc/S2VJycL8/mi-xiang-hua-sheng.jpg' },
            { name: '米香花生 (紅麥酥)', price: 150, img: 'https://i.postimg.cc/S2VJycL8/mi-xiang-hua-sheng.jpg' }
        ],
        '掛耳咖啡': [
            { name: '經典曼巴', price: 45, img: 'https://i.postimg.cc/nCGh449D/gua-er-jing-dian-man-ba.jpg' },
            { name: '藍山風味', price: 50, img: 'https://i.postimg.cc/mtygYY1t/gua-er-lan-shan-feng-wei.jpg' },
            { name: '陳年阿拉比卡', price: 45, img: 'https://i.postimg.cc/BXBnTTP4/gua-er-chen-nian-a-la-bi-ka.jpg' },
            { name: '黃金曼摩風味', price: 50, img: 'https://i.postimg.cc/6yfprr42/gua-er-huang-jin-man-mo-feng-wei.jpg' },
            { name: '黃金曼特寧', price: 55, img: 'https://i.postimg.cc/2V7SQQLy/gua-er-huang-jin-man-te-ning.jpg' }
        ]
    };

    let cart = [];
    function switchCategory(cat) {
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText.includes(cat.slice(0,2))));
        const sel = document.getElementById('prodSel');
        sel.innerHTML = products[cat].map(p => `<option value="${p.name}" data-price="${p.price}" data-img="${p.img}">${p.name} - $${p.price}</option>`).join('');
        updateUI();
    }
    function updateUI() {
        const sel = document.getElementById('prodSel');
        document.getElementById('mainImg').src = sel.options[sel.selectedIndex].dataset.img;
    }
    function addToCart() {
        const sel = document.getElementById('prodSel');
        const qty = parseInt(document.getElementById('prodQty').value);
        if (qty < 1) return;
        const exist = cart.find(i => i.name === sel.value);
        if (exist) { exist.qty += qty; } else { cart.push({ name: sel.value, price: parseInt(sel.options[sel.selectedIndex].dataset.price), qty: qty }); }
        renderCart();
    }
    function renderCart() {
        const disp = document.getElementById('cartDisplay');
        let total = 0;
        if (cart.length === 0) { disp.innerHTML = "目前無商品"; }
        else {
            disp.innerHTML = cart.map((item, idx) => {
                total += item.price * item.qty;
                return `<div class="cart-item"><span>${item.name} x ${item.qty}</span><span>$${item.price * item.qty} <button onclick="cart.splice(${idx},1);renderCart()" style="color:red; background:none; width:auto; display:inline;">(刪除)</button></span></div>`;
            }).join('');
        }
        document.getElementById('totalPrice').innerText = total;
    }

    async function submitToExcel() {
        const name = document.getElementById('uName').value.trim();
        const phone = document.getElementById('uPhone').value.trim();
        const address = document.getElementById('uAddress').value.trim();
        const bank = document.getElementById('uBank').value.trim();
        const total = document.getElementById('totalPrice').innerText;

        if (cart.length === 0) return alert("請先挑選品項");
        if (!name || !phone || !address || !bank) return alert("請完整填寫收件資訊與後五碼");

        const btn = document.getElementById('sendBtn');
        btn.disabled = true; btn.innerText = "傳送中...";

        const productDetails = cart.map(i => `${i.name}(${i.qty})`).join(', ');
        // 已經為您換成專屬網址
        const webAppUrl = "https://script.google.com/macros/s/AKfycbw6YYnzAkx85Ci7M2jYM_lQDz1z4YzfiKqCKNxDLGoMxF2nrmFd3gaGxQWRfZX0g-5cPw/exec"; 

        try {
            await fetch(webAppUrl, {
                method: "POST", mode: "no-cors",
                body: JSON.stringify({ name, phone, address, bank, productName: productDetails, totalPrice: total })
            });
            window.location.href = `success.html?total=${total}`;
        } catch (e) { 
            alert("傳送失敗，請聯繫店員或稍後再試"); 
            btn.disabled = false; btn.innerText = "送出訂單";
        }
    }
    switchCategory('生吐司');
</script>
</body>
</html>
