<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歐客佬翡翠咖啡 - 旗艦訂購系統</title>
    <style>
        :root { --primary-brown: #5D4037; --soft-beige: #F9F7F2; --accent-gold: #C2A378; }
        body { font-family: sans-serif; background-color: var(--soft-beige); padding: 20px; color: var(--primary-brown); line-height: 1.6; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 20px; }
        .tab-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 8px 15px; cursor: pointer; border: 1px solid var(--accent-gold); border-radius: 50px; color: var(--accent-gold); font-weight: bold; font-size: 0.9em; }
        .tab.active { background: var(--accent-gold); color: white; }
        .product-hero { text-align: center; margin-bottom: 20px; border: 1px solid #EEE; padding: 10px; border-radius: 10px; background: #fff; min-height: 350px; display: flex; align-items: center; justify-content: center; }
        .product-img { max-width: 100%; max-height: 400px; object-fit: contain; border-radius: 5px; }
        .cart-section { display: grid; grid-template-columns: 1fr 350px; gap: 20px; margin-top: 30px; border-top: 2px solid #F0E6D6; padding-top: 20px; }
        @media (max-width: 768px) { .cart-section { grid-template-columns: 1fr; } }
        .cart-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #EEE; font-size: 0.9em; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 15px 0; border: 1px solid #DDD; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { cursor: pointer; border-radius: 5px; border: none; font-weight: bold; width: 100%; }
        .btn-add { background: var(--primary-brown); color: white; padding: 12px; margin-top: 10px; }
        .btn-send { background: #27ae60; color: white; padding: 15px; font-size: 1.1em; }
        .promo-tag { color: #d32f2f; font-size: 0.85em; font-weight: bold; display: block; margin-bottom: 5px; }
    </style>
</head>

<div class="container">
    <div class="header">
        <h2>歐客佬精品烘培</h2>
        <div style="background: #FFF3E0; padding: 10px; border-radius: 8px; margin-bottom: 20px;">
            <span class="promo-tag">☕ 咖啡豆：買 2 送 1 (贈送最低價品項)</span>
            <span class="promo-tag">📦 掛耳包：精選系列 50包 5折 | 農場系列 200包 $2300</span>
            <span class="promo-tag">🥜 米香花生：買 10 送 1 |</span>
            <span class="promo-tag">🚚 滿 $2000 免運 (未滿收 $150)</span>
        </div>
    </div>

    <div class="tab-container" id="tabs"></div>

    <div class="product-hero">
        <img id="mainImg" src="" class="product-img">
    </div>

    <div style="background: #FFF; padding: 20px; border: 1px solid #F0E6D6; border-radius: 10px;">
        <label>選擇品項口味</label>
        <select id="prodSel" onchange="updateUI()"></select>
        <label>訂購數量</label>
        <input type="number" id="prodQty" value="1" min="1">
        <button class="btn-add" onclick="addToCart()">加入購物車</button>
    </div>

    <div class="cart-section">
        <div>
            <h3>🛒 購物清單</h3>
            <div id="cartDisplay">目前無商品</div>
            <div style="font-size: 1.5em; color: #B22222; margin-top: 20px; font-weight: bold;">
                總金額: $<span id="totalPrice">0</span>
            </div>
        </div>
        <div style="background: #FDFBF8; padding: 20px; border-radius: 10px; border: 1px solid #EEE;">
            <h3>🚚 配送與對帳資訊</h3>
            <input type="text" id="uName" placeholder="收件人姓名">
            <input type="tel" id="uPhone" placeholder="電話">
            <input type="text" id="uAddress" placeholder="配送地址">
            <input type="text" id="uBank" placeholder="匯款帳號後五碼">
            <button class="btn-send" id="sendBtn" onclick="submitToExcel()">送出訂單</button>
        </div>
    </div>
</div>

            { name: '陳年阿拉比卡 (農場濾掛)', price: 12.5, img: 'images/S__463806468_0.jpg' },
            { name: '藍山風味 (農場濾掛)', price: 12.5, img: 'images/S__463806469_0.jpg' },

            { name: '米香花生 (麻辣酥)', price: 150, img: 'images/S__464224264.jpg' },
            { name: '米香花生 (白米酥)', price: 150, img: 'images/S__464224264.jpg' },
            { name: '米香花生 (黑米酥)', price: 150, img: 'images/S__464224264.jpg' },
            { name: '米香花生 (紅麥酥)', price: 150, img: 'images/S__464224264.jpg' }
        ]
    };

    let cart = [];

    function initTabs() {
        const container = document.getElementById('tabs');
        Object.keys(products).forEach((cat, idx) => {
            const div = document.createElement('div');
            div.className = `tab ${idx === 0 ? 'active' : ''}`;
            div.innerText = cat;
            div.onclick = () => switchCategory(cat);
            container.appendChild(div);
        });
        switchCategory(Object.keys(products)[0]);
    }

    function switchCategory(cat) {
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText === cat));
        const sel = document.getElementById('prodSel');
        sel.innerHTML = products[cat].map(p => `<option value="${p.name}" data-price="${p.price}" data-img="${p.img}" data-cat="${cat}">${p.name} - $${p.price}</option>`).join('');
        updateUI();
    }

    function updateUI() {
        const sel = document.getElementById('prodSel');
        document.getElementById('mainImg').src = sel.options[sel.selectedIndex].dataset.img;
    }

    function addToCart() {
        const sel = document.getElementById('prodSel');
        const qty = parseInt(document.getElementById('prodQty').value);
        if (qty < 1) return;
        const opt = sel.options[sel.selectedIndex];
        const exist = cart.find(i => i.name === sel.value);
        if (exist) { exist.qty += qty; } 
        else { cart.push({ name: sel.value, price: parseFloat(opt.dataset.price), qty: qty, cat: opt.dataset.cat }); }
        renderCart();
    }

    function renderCart() {
        const disp = document.getElementById('cartDisplay');
        if (cart.length === 0) { disp.innerHTML = "目前無商品"; document.getElementById('totalPrice').innerText = "0"; return; }

        let farmQty = 0;           // 農場系列數量
        let premiumCoffeeQty = 0;  // 精品掛耳數量
        let premiumCoffeeAmt = 0;  // 精品掛耳原價總額
        let peanutQty = 0;
        let regularAmt = 0;        // 禮盒與花生原價總額
        let beanPrices = [];       // 咖啡豆單價清單

        cart.forEach(item => {
            if (item.cat === '咖啡豆') {
                for(let i=0; i<item.qty; i++) beanPrices.push(item.price);
            } else if (item.price === 12.5) {
                // 獨立統計：農場系列
                farmQty += item.qty;
            } else if (item.cat === '精品掛耳') {
                // 獨立統計：精品系列
                premiumCoffeeQty += item.qty;
                premiumCoffeeAmt += (item.price * item.qty);
            } else {
                if (item.cat === '米香花生') peanutQty += item.qty;
                regularAmt += (item.price * item.qty);
            }
        });

        // 1. 咖啡豆邏輯：買2送1 (扣除最低價)
        beanPrices.sort((a, b) => a - b);
        let beanTotal = 0;
        let beanDiscountCount = Math.floor(beanPrices.length / 3);
        let beanDiscountAmt = 0;
        for(let i=0; i<beanDiscountCount; i++) beanDiscountAmt += beanPrices[i];
        beanPrices.forEach(p => beanTotal += p);
        let beanFinal = beanTotal - beanDiscountAmt;

        // 2. 精品掛耳邏輯：獨立滿 50 包 5 折
        let premiumFinal = (premiumCoffeeQty >= 50) ? (premiumCoffeeAmt * 0.5) : premiumCoffeeAmt;

        // 3. 農場系列邏輯：獨立滿 200 包 $2300
        let farmFinal = (farmQty >= 200) ? (2300 + (farmQty - 200) * 11.5) : (farmQty * 12.5);
        
        // 4. 花生邏輯：買10送1
        let peanutDiscount = Math.floor(peanutQty / 11) * 150;
        
        // 總計相加
        let subtotal = beanFinal + premiumFinal + farmFinal + regularAmt - peanutDiscount;
        let shipping = (subtotal >= 2000) ? 0 : 150;

        disp.innerHTML = cart.map((item, idx) => `
            <div class="cart-item">
                <span>${item.name} x ${item.qty}</span>
                <span>$${Math.round(item.price * item.qty)} <button onclick="cart.splice(${idx},1);renderCart()" style="color:red; border:none; background:none; cursor:pointer;">(刪除)</button></span>
            </div>`).join('');

        let promoMsg = "";
        if (beanDiscountAmt > 0) promoMsg += `<br><small style="color:green;">✅ 咖啡豆已扣除最低價 $${beanDiscountAmt}</small>`;
        if (premiumCoffeeQty >= 50) promoMsg += `<br><small style="color:green;">✅ 精品掛耳已享 5 折 (共 ${premiumCoffeeQty} 包)</small>`;
        if (farmQty >= 200) promoMsg += `<br><small style="color:green;">✅ 農場系列已享 $2300 優惠 (共 ${farmQty} 包)</small>`;
        if (peanutDiscount > 0) promoMsg += `<br><small style="color:green;">✅ 花生已享買10送1</small>`;

        disp.innerHTML += `<div style="margin-top:10px; border-top:1px solid #eee; font-size:0.9em;">
            小計: $${Math.round(subtotal)} ${promoMsg}<br>
            運費: $${shipping}</div>`;
        document.getElementById('totalPrice').innerText = Math.round(subtotal + shipping);
    }

    async function submitToExcel() {
        const name = document.getElementById('uName').value;
        const phone = document.getElementById('uPhone').value;
        const addr = document.getElementById('uAddress').value;
        const bank = document.getElementById('uBank').value;
        const total = document.getElementById('totalPrice').innerText;

        if (!name || !phone || !addr || !bank || cart.length === 0) return alert("請填寫完整配送資訊");

        const btn = document.getElementById('sendBtn');
        btn.disabled = true; btn.innerText = "傳送中...";

        const details = cart.map(i => `${i.name}(${i.qty})`).join(', ');
        const url = "https://script.google.com/macros/s/AKfycbyeVLp9xJnA4c64AzaGgFINeoML6-zs5BsoSkrau4vkt10wUWA8XLYjqmnoKQcHt8ZDAQ/exec";

        try {
            await fetch(url, { method: "POST", mode: "no-cors", body: JSON.stringify({ name, phone, address: addr, bank, productName: details, totalPrice: total }) });
            window.location.href = `success.html?total=${total}`;
        } catch (e) {
            alert("送出失敗");
            btn.disabled = false; btn.innerText = "送出訂單";
        }
    }

    initTabs();
</script>

</html>
