<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歐客佬翡翠咖啡 - 旗艦訂購系統</title>
    <!-- 引入外部 CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h2>歐客佬翡翠咖啡</h2>
        <div style="background: #FFF3E0; padding: 10px; border-radius: 8px; margin-bottom: 20px;">
            <span class="promo-tag">☕ 咖啡豆 / 農場豆：買 2 送 1 (贈送最低價品項)</span>
            <span class="promo-tag">📦 精品掛耳：滿 50 包享 5 折優惠</span>
            <span class="promo-tag">📦 農場系列：滿 200 包享優惠價 $2300</span>
            <span class="promo-tag">🥜 米香花生：買 10 送 1 </span>
            <span class="promo-tag">🚚 滿 $2000 免運 (未滿收 $150)</span>
        </div>
    </div>

    <!-- 標籤切換區 -->
    <div class="tab-container" id="tabs"></div>

    <!-- 商品大圖展示 -->
    <div class="product-hero">
        <img id="mainImg" src="" class="product-img">
    </div>

    <!-- 選擇與加入購物車 -->
    <div style="background: #FFF; padding: 20px; border: 1px solid #F0E6D6; border-radius: 10px;">
        <label>選擇品項口味</label>
        <select id="prodSel" onchange="updateUI()"></select>
        <label>訂購數量</label>
        <input type="number" id="prodQty" value="1" min="1">
        <button class="btn-add" onclick="addToCart()">加入購物車</button>
    </div>

    <!-- 購物清單與結帳資訊 -->
    <div class="cart-section">
        <div>
            <h3>🛒 購物清單</h3>
            <div id="cartDisplay">目前無商品</div>
            <div style="font-size: 1.5em; color: #B22222; margin-top: 20px; font-weight: bold;">
                總金額: $<span id="totalPrice">0</span>
            </div>
        </div>
        <div style="background: #FDFBF8; padding: 20px; border-radius: 10px; border: 1px solid #EEE;">
            <h3>🚚 配送與對帳資訊</h3>
            <label>收件人姓名</label>
            <input type="text" id="uName" placeholder="請輸入姓名">
            <label>電話</label>
            <input type="tel" id="uPhone" placeholder="請輸入電話">
            <label>電子信箱 (接收訂單通知)</label>
            <input type="email" id="uEmail" placeholder="請輸入 Email">
            <label>配送地址</label>
            <input type="text" id="uAddress" placeholder="請輸入完整地址">
            <label>匯款帳號後五碼</label>
            <input type="text" id="uBank" placeholder="請輸入後五碼">
            <button class="btn-send" id="sendBtn" onclick="submitToExcel()">送出訂單並寄送通知信</button>
        </div>
    </div>
</div>

<!-- 引入外部 JavaScript -->
<script src="script.js"></script>
</body>
</html>
